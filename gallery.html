<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0c0c0c;
    --active-border: rgba(255,255,255,0.6);
    --text: #ffffff;
    --muted: rgba(255,255,255,0.25);
    --btn: rgba(255,255,255,0.08);
    --btn-hover: rgba(255,255,255,0.16);
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    user-select: none;
    font-family: system-ui, sans-serif;
  }

  /* ── CAROUSEL TRACK ── */
  .carousel {
    position: relative;
    width: 100vw;
    height: 410px;
    display: flex;
    align-items: center;
    justify-content: center;
    perspective: 1000px;
  }

  .card {
    position: absolute;
    width: 275px;
    height: 435px;
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    will-change: transform, opacity;
    background: #111;
  }

  /* ── BLURRED BACKDROP (fills the whole card) ── */
  .card .img-bg {
    position: absolute;
    inset: -10px; /* slightly oversized so blur doesn't show edges */
    background-size: cover;
    background-position: center;
    filter: blur(18px) brightness(0.55) saturate(1.3);
    transform: scale(1.08);
    pointer-events: none;
    z-index: 0;
    transition: filter 0.5s ease;
  }

  /* ── FOREGROUND IMAGE (sharp, contained, centred) ── */
  .card img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;  /* keeps full image visible */
    display: block;
    pointer-events: none;
    z-index: 1;
    transition: filter 0.5s ease;
  }

  /* ── subtle vignette on top of everything ── */
  .card::after {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 2;
    border-radius: 16px;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.35) 100%);
    pointer-events: none;
  }

  /* ── POSITIONS ── */
  .card.pos-0 {
    transform: translateX(0) scale(1) translateZ(0);
    z-index: 10;
    box-shadow: 0 0 0 2.5px var(--active-border), 0 30px 80px rgba(0,0,0,0.7);
  }
  .card.pos-0 img { filter: brightness(1); }
  .card.pos-0 .img-bg { filter: blur(18px) brightness(0.55) saturate(1.3); }

  .card.pos-1 {
    transform: translateX(260px) scale(0.78) translateZ(-80px);
    z-index: 5;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  }
  .card.pos-neg1 {
    transform: translateX(-260px) scale(0.78) translateZ(-80px);
    z-index: 5;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  }
  .card.pos-1 img,
  .card.pos-neg1 img { filter: brightness(0.45); }
  .card.pos-1 .img-bg,
  .card.pos-neg1 .img-bg { filter: blur(18px) brightness(0.25) saturate(1.3); }

  .card.pos-2 {
    transform: translateX(460px) scale(0.6) translateZ(-160px);
    z-index: 2;
    opacity: 0.6;
  }
  .card.pos-neg2 {
    transform: translateX(-460px) scale(0.6) translateZ(-160px);
    z-index: 2;
    opacity: 0.6;
  }
  .card.pos-2 img,
  .card.pos-neg2 img { filter: brightness(0.25); }

  .card.pos-far {
    transform: translateX(640px) scale(0.5) translateZ(-200px);
    z-index: 1;
    opacity: 0;
    pointer-events: none;
  }
  .card.pos-farneg {
    transform: translateX(-640px) scale(0.5) translateZ(-200px);
    z-index: 1;
    opacity: 0;
    pointer-events: none;
  }

  /* ── CONTROLS ── */
  .controls {
    display: flex;
    align-items: center;
    gap: 1.2rem;
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    margin-top: 2.5rem;
    z-index: 100;
  }

  .btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--btn);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    outline: none;
    -webkit-tap-highlight-color: transparent;
  }

  .btn:hover { background: var(--btn-hover); transform: scale(1.08); }
  .btn:active { transform: scale(0.95); }
  .btn:focus { outline: none; }

  .btn-play {
    width: 48px; height: 48px;
    background: transparent;
    border: none;
  }
  .btn-play:hover { background: transparent; transform: scale(1.08); }
  .btn-play.playing { background: transparent; border: none; }

  /* ── PHOTO COUNT inside active card ── */
  .card-count {
    position: absolute;
    bottom: 10px;
    right: 12px;
    font-size: 0.65rem;
    font-family: system-ui, sans-serif;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: rgba(255,255,255,0.9);
    background: rgba(0,0,0,0.45);
    padding: 3px 8px;
    border-radius: 20px;
    pointer-events: none;
    z-index: 20;
    backdrop-filter: blur(4px);
    opacity: 0;
    transition: opacity 0.4s;
  }

  .card.pos-0 .card-count { opacity: 1; }

  /* ── BACK ── */
  .back {
    position: fixed;
    top: 0.8rem; 
    left: 0.8rem;
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--btn);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text);
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    text-decoration: none;
    transition: background 0.2s;
    z-index: 100;
  }
  .back:hover { background: var(--btn-hover); }

  /* ── PROGRESS ── */
  .progress {
    position: fixed;
    bottom: 0; left: 0;
    height: 2px;
    background: var(--active-border);
    transition: width 0.4s ease;
    z-index: 100;
    opacity: 0.5;
  }
</style>
</head>
<body>

<a href="https://example/backtosite.com" class="back">
  <svg viewBox="0 0 24 24" fill="none" width="18" height="18" xmlns="http://www.w3.org/2000/svg">
    <path d="M19 12H5M5 12L12 19M5 12L12 5" stroke="rgba(255,255,255,0.85)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
</a>
<div class="progress" id="progress"></div>

<div class="carousel" id="carousel"></div>

<div class="controls">
  <button class="btn" onclick="shift(-1)">
    <svg viewBox="0 0 24 24" fill="none" width="20" height="20" xmlns="http://www.w3.org/2000/svg">
      <path d="M15 18L9 12L15 6" stroke="rgba(255,255,255,0.8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
  <button class="btn btn-play" id="btnPlay" onclick="togglePlay()">
    <svg id="iconPlay" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="48" height="48">
      <path d="M12 3C7.02944 3 3 7.02944 3 12C3 16.9706 7.02944 21 12 21C16.9706 21 21 16.9706 21 12C21 7.02944 16.9706 3 12 3Z" stroke="rgba(255,255,255,0.85)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
      <path d="M10 15V9L15 12L10 15Z" stroke="rgba(255,255,255,0.85)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
    </svg>
    <svg id="iconPause" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="48" height="48" style="display:none">
      <path d="M10 9V15M14 9V15M12 21C16.9706 21 21 16.9706 21 12C21 7.02944 16.9706 3 12 3C7.02944 3 3 7.02944 3 12C3 16.9706 7.02944 21 12 21Z" stroke="rgba(255,255,255,0.85)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
    </svg>
  </button>
  <button class="btn" onclick="shift(1)">
    <svg viewBox="0 0 24 24" fill="none" width="20" height="20" xmlns="http://www.w3.org/2000/svg">
      <path d="M9 18L15 12L9 6" stroke="rgba(255,255,255,0.8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, query, where, orderBy, onSnapshot }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ── PASTE YOUR FIREBASE CONFIG HERE (same as index.html & admin.html) ────
  const firebaseConfig = {
    apiKey: "AIzaSyCSdoag6gzTX-MKxDIZWJyPlcM1hkj_cxs",
    authDomain: "gallery-c5a1e.firebaseapp.com",
    projectId: "gallery-c5a1e",
    storageBucket: "gallery-c5a1e.firebasestorage.app",
    messagingSenderId: "175792322603",
    appId: "1:175792322603:web:1a8c0bc71c4476b308926e"
  };
  // ─────────────────────────────────────────────────────────────────────────

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  // Listen for approved submissions in real-time
  const q = query(
    collection(db, 'submissions'),
    where('status', '==', 'approved'),
    orderBy('createdAt', 'desc')
  );

  onSnapshot(q, snap => {
    const images = snap.docs.map(d => ({
      src: d.data().imageUrl,
      name: d.data().nickname
    }));
    initCarousel(images);
  });

  // ── Everything below is your original carousel code, unchanged ──────────
  let current = 0;
  let playing = false;
  let timer = null;
  const INTERVAL = 3000;

  const carousel = document.getElementById('carousel');
  const btnPlay  = document.getElementById('btnPlay');

  function initCarousel(images) {
    if (images.length === 0) {
      carousel.innerHTML = '<p style="color:rgba(255,255,255,0.4);font-size:0.95rem;">No approved photos yet.</p>';
      return;
    }

    current = 0;
    carousel.innerHTML = '';

    images.forEach(({ src, name }, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.index = i;

      const bg = document.createElement('div');
      bg.className = 'img-bg';
      bg.style.backgroundImage = `url('${src}')`;
      card.appendChild(bg);

      const img = document.createElement('img');
      img.src = src;
      img.alt = name;
      img.draggable = false;
      card.appendChild(img);

      // Name label
      const label = document.createElement('div');
      label.style.cssText = `
        position:absolute; bottom:32px; left:0; right:0;
        text-align:center; z-index:20;
        font-size:0.85rem; font-weight:700;
        color:rgba(255,255,255,0.95);
        text-shadow:0 1px 6px rgba(0,0,0,0.7);
        pointer-events:none;
      `;
      label.textContent = name;
      card.appendChild(label);

      const count = document.createElement('div');
      count.className = 'card-count';
      count.textContent = `${i + 1}/${images.length}`;
      card.appendChild(count);

      card.addEventListener('click', () => {
        const p = getPos(i, images.length);
        if (p === 1 || p === -1) { current = i; render(images.length); }
      });

      carousel.appendChild(card);
    });

    render(images.length);
  }

  function getPos(i, n) {
    let d = i - current;
    if (d > n / 2)  d -= n;
    if (d < -n / 2) d += n;
    return d;
  }

  function posClass(d) {
    if (d === 0)  return 'pos-0';
    if (d === 1)  return 'pos-1';
    if (d === -1) return 'pos-neg1';
    if (d === 2)  return 'pos-2';
    if (d === -2) return 'pos-neg2';
    return d > 0 ? 'pos-far' : 'pos-farneg';
  }

  function render(n) {
    const cards = carousel.querySelectorAll('.card');
    const total = n || cards.length;
    cards.forEach(card => {
      const d = getPos(parseInt(card.dataset.index), total);
      card.className = 'card ' + posClass(d);
    });
    document.getElementById('progress').style.width =
      `${((current + 1) / total) * 100}%`;
  }

  window.shift = function(dir) {
    const total = carousel.querySelectorAll('.card').length;
    current = (current + dir + total) % total;
    render(total);
    if (playing) resetTimer();
  };

  window.togglePlay = function() {
    playing = !playing;
    if (playing) {
      btnPlay.classList.add('playing');
      document.getElementById('iconPlay').style.display = 'none';
      document.getElementById('iconPause').style.display = 'block';
      startTimer();
    } else {
      btnPlay.classList.remove('playing');
      document.getElementById('iconPlay').style.display = 'block';
      document.getElementById('iconPause').style.display = 'none';
      clearInterval(timer);
    }
  };

  function startTimer() { timer = setInterval(() => window.shift(1), INTERVAL); }
  function resetTimer()  { clearInterval(timer); startTimer(); }

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft')  window.shift(-1);
    if (e.key === 'ArrowRight') window.shift(1);
    if (e.key === ' ') { e.preventDefault(); window.togglePlay(); }
  });

  let tx = 0;
  document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive: true });
  document.addEventListener('touchend',   e => {
    const dx = e.changedTouches[0].clientX - tx;
    if (Math.abs(dx) > 50) window.shift(dx < 0 ? 1 : -1);
  });

</script>
</body>
</html>
