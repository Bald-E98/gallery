<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gallery Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0c0c0c; color: #fff;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh; padding: 2rem 1rem 3rem;
    }
    h1 {
      font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800;
      text-align: center; margin-bottom: 0.3rem;
      background: linear-gradient(135deg, #fff, #aaa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .subtitle {
      text-align: center; color: rgba(255,255,255,0.35);
      font-size: 0.85rem; margin-bottom: 2rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 0.9rem; max-width: 600px; margin: 0 auto;
    }
    .person-card {
      background: #1a1a1a; border: 1.5px solid #2a2a2a;
      border-radius: 16px; padding: 1.2rem 0.8rem;
      text-align: center; text-decoration: none; color: #fff;
      transition: border-color 0.2s, transform 0.2s, background 0.2s;
      display: flex; flex-direction: column; align-items: center; gap: 0.6rem;
    }
    .person-card:hover {
      border-color: rgba(255,255,255,0.4);
      background: #222; transform: translateY(-3px);
    }
    .avatar {
      width: 52px; height: 52px; border-radius: 50%;
      background: linear-gradient(135deg, #7c6cfc, #fc6c8f);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 800;
      color: #fff; flex-shrink: 0;
    }
    .person-name {
      font-family: 'Syne', sans-serif; font-size: 0.85rem; font-weight: 700;
      line-height: 1.2;
    }
    .arrow {
      font-size: 0.75rem; color: rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>
  <h1>📸 Gallery</h1>
  <p class="subtitle">Select a person to view their photos</p>
