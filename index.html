<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Photo & Video Submit</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #13131a; --border: #2a2a3a;
      --accent: #7c6cfc; --accent2: #fc6c8f; --text: #f0f0f8;
      --muted: #6b6b8a; --success: #4ade80;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem 1rem; position: relative; overflow-x: hidden;
    }
    body::before {
      content:''; position:fixed; top:-30%; left:-20%; width:60vw; height:60vw;
      background:radial-gradient(circle,rgba(124,108,252,.12) 0%,transparent 70%);
      pointer-events:none; z-index:0;
    }
    body::after {
      content:''; position:fixed; bottom:-30%; right:-20%; width:50vw; height:50vw;
      background:radial-gradient(circle,rgba(252,108,143,.10) 0%,transparent 70%);
      pointer-events:none; z-index:0;
    }
    .container { width:100%; max-width:520px; position:relative; z-index:1; }
    header { text-align:center; margin-bottom:2.5rem; animation:fadeDown 0.6s ease both; }
    header h1 {
      font-family:'Syne',sans-serif; font-weight:800; font-size:2.2rem;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    header p { color:var(--muted); font-size:0.95rem; margin-top:0.4rem; font-weight:300; }
    .card {
      background:var(--surface); border:1px solid var(--border); border-radius:20px;
      padding:2rem; display:flex; flex-direction:column; gap:1.8rem;
      animation:fadeUp 0.6s ease 0.1s both; box-shadow:0 0 60px rgba(124,108,252,0.06);
    }

    /* Upload Zone */
    .upload-zone {
      border:2px dashed var(--border); border-radius:14px; padding:2.5rem 1.5rem;
      text-align:center; cursor:pointer;
      transition:border-color 0.25s,background 0.25s; position:relative; overflow:hidden;
    }
    .upload-zone:hover, .upload-zone.dragover {
      border-color:var(--accent); background:rgba(124,108,252,0.05);
    }
    .upload-zone input[type="file"] {
      position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%;
    }
    .upload-icon { font-size:2.5rem; margin-bottom:0.8rem; display:block; }
    .upload-zone p { color:var(--muted); font-size:0.9rem; }
    .upload-zone strong { color:var(--accent); }

    /* Preview */
    .preview-wrap { display:none; flex-direction:column; align-items:center; gap:1rem; }
    .preview-wrap.visible { display:flex; }
    .preview-wrap img, .preview-wrap video {
      width:100%; max-height:280px; object-fit:cover;
      border-radius:12px; border:1px solid var(--border);
    }
    .preview-wrap video { object-fit:contain; background:#000; }
    .change-btn {
      background:none; border:1px solid var(--border); color:var(--muted);
      font-family:'DM Sans',sans-serif; font-size:0.82rem; padding:0.35rem 1rem;
      border-radius:20px; cursor:pointer; transition:border-color 0.2s,color 0.2s;
    }
    .change-btn:hover { border-color:var(--accent); color:var(--accent); }

    /* Type badge */
    .type-badge {
      display:inline-flex; align-items:center; gap:0.4rem;
      font-size:0.75rem; font-weight:600; padding:0.25rem 0.7rem;
      border-radius:20px; border:1px solid var(--border); color:var(--muted);
    }
    .type-badge.image { border-color:var(--accent); color:var(--accent); }
    .type-badge.video { border-color:#fc6c8f; color:#fc6c8f; }

    /* Nickname grid */
    .section-label {
      font-family:'Syne',sans-serif; font-size:0.75rem; font-weight:600;
      text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); margin-bottom:0.8rem;
    }
    .nickname-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:0.6rem; }
    .nick-btn {
      background:var(--bg); border:1px solid var(--border); color:var(--text);
      font-family:'DM Sans',sans-serif; font-size:0.85rem; font-weight:500;
      padding:0.6rem 0.4rem; border-radius:10px; cursor:pointer;
      transition:all 0.2s; text-align:center;
    }
    .nick-btn:hover { border-color:var(--accent); color:var(--accent); }
    .nick-btn.selected {
      background:linear-gradient(135deg,var(--accent),#9b8dff);
      border-color:transparent; color:#fff; font-weight:600;
      box-shadow:0 4px 20px rgba(124,108,252,0.35); transform:translateY(-1px);
    }

    /* Submit */
    .submit-btn {
      width:100%; padding:1rem;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      border:none; border-radius:12px; color:#fff;
      font-family:'Syne',sans-serif; font-size:1rem; font-weight:700;
      cursor:pointer; transition:opacity 0.2s,transform 0.2s;
    }
    .submit-btn:disabled { opacity:0.35; cursor:not-allowed; }
    .submit-btn:not(:disabled):hover { opacity:0.9; transform:translateY(-1px); }

    /* Progress bar */
    .progress-wrap {
      display:none; flex-direction:column; gap:0.5rem;
    }
    .progress-wrap.visible { display:flex; }
    .progress-bar-bg {
      width:100%; height:8px; background:var(--border); border-radius:10px; overflow:hidden;
    }
    .progress-bar-fill {
      height:100%; width:0%; border-radius:10px;
      background:linear-gradient(90deg,var(--accent),var(--accent2));
      transition:width 0.3s ease;
    }
    .progress-label { font-size:0.8rem; color:var(--muted); text-align:center; }

    /* Success */
    .success-screen { display:none; flex-direction:column; align-items:center; text-align:center; gap:1rem; padding:2rem 0; }
    .success-screen.visible { display:flex; }
    .success-icon {
      width:64px; height:64px; background:rgba(74,222,128,0.15); border-radius:50%;
      display:flex; align-items:center; justify-content:center; font-size:2rem;
      animation:pop 0.4s cubic-bezier(0.175,0.885,0.32,1.275) both;
    }
    .success-screen h2 { font-family:'Syne',sans-serif; font-size:1.4rem; color:var(--success); }
    .success-screen p { color:var(--muted); font-size:0.9rem; }
    .again-btn {
      margin-top:0.5rem; background:none; border:1px solid var(--accent);
      color:var(--accent); font-family:'DM Sans',sans-serif; font-size:0.9rem;
      padding:0.6rem 1.5rem; border-radius:20px; cursor:pointer;
      transition:background 0.2s,color 0.2s;
    }
    .again-btn:hover { background:var(--accent); color:#fff; }

    .spinner {
      display:inline-block; width:18px; height:18px;
      border:2px solid rgba(255,255,255,0.4); border-top-color:#fff;
      border-radius:50%; animation:spin 0.7s linear infinite;
      vertical-align:middle; margin-right:8px;
    }

    @keyframes fadeDown { from{opacity:0;transform:translateY(-16px)} to{opacity:1;transform:none} }
    @keyframes fadeUp   { from{opacity:0;transform:translateY(16px)}  to{opacity:1;transform:none} }
    @keyframes spin     { to{transform:rotate(360deg)} }
    @keyframes pop      { from{transform:scale(0.4);opacity:0} to{transform:scale(1);opacity:1} }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>Submit</h1>
    <p>Upload a photo or video and tag the person</p>
  </header>

  <div class="card" id="mainCard">

    <!-- Upload Zone -->
    <div id="uploadZone" class="upload-zone">
      <input type="file" id="fileInput" accept="image/*,video/*" />
      <span class="upload-icon">📷🎥</span>
      <p><strong>Click to upload</strong> or drag & drop</p>
      <p style="margin-top:0.3rem;font-size:0.8rem;">Photos & Videos supported</p>
    </div>

    <!-- Preview -->
    <div class="preview-wrap" id="previewWrap">
      <img id="previewImg" src="" alt="Preview" style="display:none"/>
      <video id="previewVid" controls style="display:none"></video>
      <span class="type-badge" id="typeBadge"></span>
      <button class="change-btn" onclick="resetUpload()">✕ Change file</button>
    </div>

    <!-- Nickname Picker -->
    <div id="nicknameSection">
      <div class="section-label">Select Person</div>
      <div class="nickname-grid" id="nicknameGrid"></div>
    </div>

    <!-- Progress -->
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
      <div class="progress-label" id="progressLabel">Uploading... 0%</div>
    </div>

    <!-- Submit -->
    <button class="submit-btn" id="submitBtn" disabled onclick="handleSubmit()">
      Submit
    </button>

    <!-- Success -->
    <div class="success-screen" id="successScreen">
      <div class="success-icon">✓</div>
      <h2>Submitted!</h2>
      <p>Your file has been sent for review.</p>
      <button class="again-btn" onclick="resetAll()">Submit another</button>
    </div>

  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCSdoag6gzTX-MKxDIZWJyPlcM1hkj_cxs",
    authDomain: "gallery-c5a1e.firebaseapp.com",
    projectId: "gallery-c5a1e",
    storageBucket: "gallery-c5a1e.firebasestorage.app",
    messagingSenderId: "175792322603",
    appId: "1:175792322603:web:1a8c0bc71c4476b308926e"
  };

  // ── Cloudinary config ─────────────────────────────────────────────────────
  const CLOUD_NAME   = "dsgweqqew";
  const UPLOAD_PRESET = "ml_default"; // your unsigned preset
  // ─────────────────────────────────────────────────────────────────────────

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  const nicknames = [
    "Dyanjith","Amalnath","Sreenand","Mibsam","Sidharth",
    "Anunand","Sarang","Aadish","AmalRaj","Navajoth",
    "Nived","Chinmay","Arjun","Adikrishna","Devanand","NandhuKrishna"
  ];

  let selectedFile = null;
  let selectedNick = null;
  let fileType     = null; // 'image' or 'video'

  // Build nickname buttons
  const grid = document.getElementById('nicknameGrid');
  nicknames.forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'nick-btn';
    btn.textContent = name;
    btn.onclick = () => {
      document.querySelectorAll('.nick-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedNick = name;
      checkReady();
    };
    grid.appendChild(btn);
  });

  const fileInput  = document.getElementById('fileInput');
  const uploadZone = document.getElementById('uploadZone');

  fileInput.addEventListener('change', e => { if(e.target.files[0]) handleFile(e.target.files[0]); });
  uploadZone.addEventListener('dragover',  e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
  uploadZone.addEventListener('drop', e => {
    e.preventDefault(); uploadZone.classList.remove('dragover');
    if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
  });

  function handleFile(file) {
    selectedFile = file;
    fileType = file.type.startsWith('video/') ? 'video' : 'image';
    const reader = new FileReader();
    reader.onload = ev => {
      const img = document.getElementById('previewImg');
      const vid = document.getElementById('previewVid');
      const badge = document.getElementById('typeBadge');
      if (fileType === 'video') {
        vid.src = ev.target.result; vid.style.display = ''; img.style.display = 'none';
        badge.textContent = '🎥 Video'; badge.className = 'type-badge video';
      } else {
        img.src = ev.target.result; img.style.display = ''; vid.style.display = 'none';
        badge.textContent = '📷 Photo'; badge.className = 'type-badge image';
      }
      uploadZone.style.display = 'none';
      document.getElementById('previewWrap').classList.add('visible');
      checkReady();
    };
    reader.readAsDataURL(file);
  }

  function checkReady() {
    document.getElementById('submitBtn').disabled = !(selectedFile && selectedNick);
  }

  window.resetUpload = function() {
    selectedFile = null; fileType = null;
    fileInput.value = '';
    document.getElementById('previewImg').src = '';
    document.getElementById('previewVid').src = '';
    uploadZone.style.display = '';
    document.getElementById('previewWrap').classList.remove('visible');
    checkReady();
  };

  window.resetAll = function() {
    selectedNick = null;
    document.querySelectorAll('.nick-btn').forEach(b => b.classList.remove('selected'));
    document.getElementById('successScreen').classList.remove('visible');
    document.getElementById('nicknameSection').style.display = '';
    document.getElementById('submitBtn').style.display = '';
    document.getElementById('progressWrap').classList.remove('visible');
    resetUpload();
  };

  window.handleSubmit = async function() {
    if (!selectedFile || !selectedNick) return;

    const btn = document.getElementById('submitBtn');
    const progressWrap = document.getElementById('progressWrap');
    const progressFill = document.getElementById('progressFill');
    const progressLabel = document.getElementById('progressLabel');

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Uploading...';
    progressWrap.classList.add('visible');

    try {
      // Upload to Cloudinary via XHR so we can track progress
      const formData = new FormData();
      formData.append('file', selectedFile);
      formData.append('upload_preset', UPLOAD_PRESET);

      const resourceType = fileType === 'video' ? 'video' : 'image';
      const url = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/${resourceType}/upload`;

      const mediaUrl = await new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open('POST', url);
        xhr.upload.onprogress = e => {
          if (e.lengthComputable) {
            const pct = Math.round((e.loaded / e.total) * 100);
            progressFill.style.width = pct + '%';
            progressLabel.textContent = `Uploading... ${pct}%`;
          }
        };
        xhr.onload = () => {
          if (xhr.status === 200) {
            const res = JSON.parse(xhr.responseText);
            resolve(res.secure_url);
          } else {
            reject(new Error('Cloudinary upload failed'));
          }
        };
        xhr.onerror = () => reject(new Error('Network error'));
        xhr.send(formData);
      });

      progressLabel.textContent = 'Saving...';
      progressFill.style.width = '100%';

      // Save to Firestore
      await addDoc(collection(db, 'submissions'), {
        mediaUrl,
        fileType,
        nickname: selectedNick,
        status: 'pending',
        createdAt: serverTimestamp()
      });

      // Show success
      document.getElementById('nicknameSection').style.display = 'none';
      btn.style.display = 'none';
      document.getElementById('previewWrap').classList.remove('visible');
      uploadZone.style.display = 'none';
      progressWrap.classList.remove('visible');
      document.getElementById('successScreen').classList.add('visible');

    } catch(err) {
      console.error(err);
      alert('Upload failed. Please try again.');
      btn.disabled = false;
      btn.innerHTML = 'Submit';
      progressWrap.classList.remove('visible');
    }
  };
</script>
</body>
</html>
